<!DOCTYPE html>
<html>
<head>
    <title>LLM Log Stream Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: #282a36;
            color: #f8f8f2;
        }
        #tab-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #tabs {
            display: flex;
            align-items: center;
            background: #44475a;
            border-bottom: 1px solid #6272a4;
            padding: 5px;
            padding-bottom: 0px;
        }
        .tab {
            padding: 8px 16px;
            background: #44475a;
            border: 1px solid #6272a4;
            border-bottom: none;
            margin-right: 5px;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            color: #f8f8f2;
            margin-top: 3px;
        }
        .tab.active {
            background: #282a36;
            border-bottom: 1px solid #282a36;
            margin-bottom: -1px;
        }
        .tab .close-btn {
            margin-left: 8px;
            color: #ff5555;
            cursor: pointer;
        }
        .tab .close-btn:hover {
            color: #ff3333;
        }
        #content {
            flex: 1;
            overflow: hidden;
            position: relative;
            padding-bottom: 20px;
        }
        .log-pane {
            display: none;
            position: relative;
            height: 100%;
            background: #282a36;
        }
        .log-pane.active {
            display: block;
        }
        .log-container {
            height: 100%;
            overflow-y: auto;
            padding: 20px 36px 20px 20px;
            background: #282a36;
            color: #f8f8f2;
        }
        .search-hit-map {
            position: absolute;
            top: 8px;
            right: 8px;
            bottom: 8px;
            width: 14px;
            display: none;
            border-radius: 999px;
            background: rgba(98, 114, 164, 0.16);
            pointer-events: auto;
            z-index: 1;
        }
        .search-hit-map.active {
            display: block;
        }
        .search-hit-marker {
            position: absolute;
            left: 2px;
            width: 10px;
            height: 4px;
            padding: 0;
            border: 0;
            border-radius: 999px;
            background: #f1fa8c;
            box-shadow: 0 0 0 1px rgba(40, 42, 54, 0.55);
            cursor: pointer;
            pointer-events: auto;
        }
        .search-hit-marker:hover,
        .search-hit-marker:focus-visible {
            background: #fff5a4;
            outline: none;
        }
        .message {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 4px;
            background: #44475a;
        }
        .message.system {
            background: #282a36;
            border-left: 4px solid #5b89ad;
        }
        .message.assistant {
            background: #3b596d;
            border-left: 4px solid #8be9fd;
        }
        .message.user {
            background: #526b65;
            border-left: 4px solid #50fa7b;
        }
        .message .role {
            font-weight: bold;
            margin-bottom: 4px;
            color: #ff79c6;
        }
        .message .content {
            white-space: pre-wrap;
            word-break: break-word;
            color: #f8f8f2;
        }
        .event-panel {
            margin-bottom: 16px;
            padding: 14px;
            border-radius: 6px;
            background: #313442;
            border-left: 4px solid #bd93f9;
            box-shadow: inset 0 0 0 1px rgba(255, 255, 255, 0.04);
        }
        .event-panel.assistant_message_start {
            border-left-color: #74c0fc;
        }
        .event-panel.assistant_message_end {
            border-left-color: #8be9fd;
        }
        .event-panel.tool_start {
            border-left-color: #ffb86c;
        }
        .event-panel.tool_end {
            border-left-color: #ff9e64;
        }
        .event-panel.model_request {
            border-left-color: #7ee787;
            background: #2f3941;
        }
        .event-header {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .event-title {
            font-size: 1.02em;
            font-weight: 700;
            color: #f8f8f2;
        }
        .event-header-meta {
            font-size: 0.82em;
            color: #a6b0cf;
        }
        .event-body {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 10px;
        }
        .event-meta-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
            gap: 8px;
        }
        .event-meta-row {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            padding: 8px 10px;
        }
        .event-meta-label {
            color: #8b93ad;
            font-size: 0.76em;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 4px;
        }
        .event-meta-value {
            color: #f8f8f2;
            word-break: break-word;
            white-space: pre-wrap;
        }
        .event-section {
            display: flex;
            flex-direction: column;
            gap: 8px;
        }
        .event-section-title {
            color: #f1fa8c;
            font-size: 0.84em;
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }
        .event-details,
        .nested-details {
            background: rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            overflow: hidden;
        }
        .event-details-summary,
        .nested-summary {
            cursor: pointer;
            list-style: none;
            padding: 10px 12px;
            color: #f8f8f2;
            user-select: none;
        }
        .event-details-summary::-webkit-details-marker,
        .nested-summary::-webkit-details-marker {
            display: none;
        }
        .event-details-summary::before,
        .nested-summary::before {
            content: '▸';
            display: inline-block;
            margin-right: 8px;
            color: #bd93f9;
            transition: transform 0.15s ease;
        }
        .event-details[open] > .event-details-summary::before,
        .nested-details[open] > .nested-summary::before {
            transform: rotate(90deg);
        }
        .event-pre {
            margin: 0;
            padding: 0 12px 12px;
            color: #dbe4ff;
            white-space: pre-wrap;
            word-break: break-word;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
            font-size: 0.88em;
            overflow-x: auto;
        }
        .nested-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .nested-body {
            padding: 0 12px 12px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        .nested-subcard {
            background: rgba(255, 255, 255, 0.04);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 4px;
            padding: 10px;
        }
        .event-empty {
            color: #8b93ad;
            font-style: italic;
            padding: 6px 2px;
        }
        .event-inline-kv {
            display: flex;
            gap: 8px;
            align-items: baseline;
            color: #f8f8f2;
        }
        .event-inline-key {
            color: #8b93ad;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.76em;
        }
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #44475a;
        }
        ::-webkit-scrollbar-thumb {
            background: #6272a4;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #bd93f9;
        }
        .message-footer {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85em;
            color: #a1a1a1;
            display: flex;
            gap: 15px;
        }
        .message-footer .token-count {
            display: none;
        }
        .message-footer .token-count.visible {
            display: inline;
        }
        #token-controls {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 10px;
            color: #f8f8f2;
            font-size: 0.9em;
        }
        #token-totals {
            font-size: 0.9em;
            color: #bd93f9;
            display: none;
        }
        #token-counting-toggle {
            cursor: pointer;
            margin-right: 5px;
        }
        #token-controls label {
            cursor: pointer;
            display: flex;
            align-items: center;
            user-select: none;
        }

        #tokens-in {
            color: #50fa7b;
        }
        #tokens-out {
            color: #ff5555;
        }

        /* Search bar */
        #search-bar {
            background: #383a4a;
            padding: 7px 10px;
            border-bottom: 1px solid #6272a4;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        #search-row {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #role-filter-bar {
            display: flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 6px;
        }
        #role-filter-bar:empty {
            display: none;
        }
        #role-filter-prefix {
            font-size: 0.78em;
            color: #6272a4;
            white-space: nowrap;
            margin-right: 2px;
        }
        .role-filter-label {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 0.78em;
            color: #f8f8f2;
            user-select: none;
            padding: 2px 7px 2px 5px;
            border-radius: 3px;
            border: 1px solid #6272a4;
            transition: border-color 0.15s, opacity 0.15s;
        }
        .role-filter-label:hover {
            border-color: #bd93f9;
        }
        .role-filter-label.disabled {
            opacity: 0.38;
        }
        .role-filter-label input[type="checkbox"] {
            cursor: pointer;
            margin: 0;
            width: 11px;
            height: 11px;
            accent-color: #bd93f9;
        }
        .role-filter-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            flex-shrink: 0;
        }
        #search-input {
            flex: 1;
            background: #282a36;
            color: #f8f8f2;
            border: 1px solid #6272a4;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 0.9em;
            outline: none;
            font-family: inherit;
        }
        #search-input:focus {
            border-color: #bd93f9;
        }
        #search-input::placeholder {
            color: #6272a4;
        }
        #search-clear {
            background: none;
            border: none;
            color: #6272a4;
            cursor: pointer;
            font-size: 1.1em;
            padding: 3px 7px;
            border-radius: 4px;
            display: none;
            line-height: 1;
        }
        #search-clear:hover {
            color: #ff5555;
            background: rgba(255, 85, 85, 0.1);
        }
        #search-clear.visible {
            display: block;
        }
        #search-count {
            font-size: 0.85em;
            color: #6272a4;
            white-space: nowrap;
            min-width: 90px;
            text-align: right;
        }
        #search-count.has-results {
            color: #bd93f9;
        }
        mark.search-highlight {
            background: #f1fa8c;
            color: #282a36;
            border-radius: 2px;
            padding: 0 1px;
        }
    </style>
</head>
<body>
    <div id="tab-container">
        <div id="search-bar">
            <div id="search-row">
                <input type="text" id="search-input" placeholder="Search messages and events…" autocomplete="off" spellcheck="false" />
                <button id="search-clear" title="Clear search">✕</button>
                <span id="search-count"></span>
            </div>
            <div id="role-filter-bar"></div>
        </div>
        <div id="tabs">
            <div id="token-controls">
                <span id="token-totals">
                    In: <span id="tokens-in">0</span> | Out: <span id="tokens-out">0</span>
                </span>
                <label>
                    <input type="checkbox" id="autoscroll-toggle" checked> Auto-focus
                </label>
                <label>
                    <input type="checkbox" id="token-counting-toggle"> Count Tokens
                </label>
            </div>
        </div>
        <div id="content"></div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
