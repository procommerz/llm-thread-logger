<!DOCTYPE html>
<html>
<head>
    <title>LLM Log Stream Viewer</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, 'Open Sans', 'Helvetica Neue', sans-serif;
            background: #282a36;
            color: #f8f8f2;
        }
        #tab-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }
        #tabs {
            display: flex;
            align-items: center;
            background: #44475a;
            border-bottom: 1px solid #6272a4;
            padding: 5px;
            padding-bottom: 0px;
        }
        .tab {
            padding: 8px 16px;
            background: #44475a;
            border: 1px solid #6272a4;
            border-bottom: none;
            margin-right: 5px;
            cursor: pointer;
            border-radius: 4px 4px 0 0;
            color: #f8f8f2;
            margin-top: 3px;
        }
        .tab.active {
            background: #282a36;
            border-bottom: 1px solid #282a36;
            margin-bottom: -1px;
        }
        .tab .close-btn {
            margin-left: 8px;
            color: #ff5555;
            cursor: pointer;
        }
        .tab .close-btn:hover {
            color: #ff3333;
        }
        #content {
            flex: 1;
            overflow: hidden;
            position: relative;
            padding-bottom: 20px;
        }
        .log-container {
            display: none;
            height: 100%;
            overflow-y: auto;
            padding: 20px;
            background: #282a36;
            color: #f8f8f2;
        }
        .log-container.active {
            display: block;
        }
        .message {
            margin-bottom: 16px;
            padding: 12px;
            border-radius: 4px;
            background: #44475a;
        }
        .message.system {
            background: #282a36;
            border-left: 4px solid #5b89ad;
        }
        .message.assistant {
            background: #3b596d;
            border-left: 4px solid #8be9fd;
        }
        .message.user {
            background: #526b65;
            border-left: 4px solid #50fa7b;
        }
        .message .role {
            font-weight: bold;
            margin-bottom: 4px;
            color: #ff79c6;
        }
        .message .content {
            white-space: pre-wrap;
            word-break: break-word;
            color: #f8f8f2;
        }
        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #44475a;
        }
        ::-webkit-scrollbar-thumb {
            background: #6272a4;
            border-radius: 4px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #bd93f9;
        }
        .message-footer {
            margin-top: 8px;
            padding-top: 8px;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 0.85em;
            color: #a1a1a1;
            display: flex;
            gap: 15px;
        }
        .message-footer .token-count {
            display: none;
        }
        .message-footer .token-count.visible {
            display: inline;
        }
        #token-controls {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 15px;
            padding: 0 10px;
            color: #f8f8f2;
            font-size: 0.9em;
        }
        #token-totals {
            font-size: 0.9em;
            color: #bd93f9;
            display: none;
        }
        #token-counting-toggle {
            cursor: pointer;
            margin-right: 5px;
        }
        #token-controls label {
            cursor: pointer;
            display: flex;
            align-items: center;
            user-select: none;
        }

        #tokens-in {
            color: #50fa7b;
        }
        #tokens-out {
            color: #ff5555;
        }

        /* Search bar */
        #search-bar {
            background: #383a4a;
            padding: 7px 10px;
            border-bottom: 1px solid #6272a4;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        #search-input {
            flex: 1;
            background: #282a36;
            color: #f8f8f2;
            border: 1px solid #6272a4;
            border-radius: 4px;
            padding: 6px 10px;
            font-size: 0.9em;
            outline: none;
            font-family: inherit;
        }
        #search-input:focus {
            border-color: #bd93f9;
        }
        #search-input::placeholder {
            color: #6272a4;
        }
        #search-clear {
            background: none;
            border: none;
            color: #6272a4;
            cursor: pointer;
            font-size: 1.1em;
            padding: 3px 7px;
            border-radius: 4px;
            display: none;
            line-height: 1;
        }
        #search-clear:hover {
            color: #ff5555;
            background: rgba(255, 85, 85, 0.1);
        }
        #search-clear.visible {
            display: block;
        }
        #search-count {
            font-size: 0.85em;
            color: #6272a4;
            white-space: nowrap;
            min-width: 90px;
            text-align: right;
        }
        #search-count.has-results {
            color: #bd93f9;
        }
        mark.search-highlight {
            background: #f1fa8c;
            color: #282a36;
            border-radius: 2px;
            padding: 0 1px;
        }
    </style>
</head>
<body>
    <div id="tab-container">
        <div id="search-bar">
            <input type="text" id="search-input" placeholder="Search messages…" autocomplete="off" spellcheck="false" />
            <button id="search-clear" title="Clear search">✕</button>
            <span id="search-count"></span>
        </div>
        <div id="tabs">
            <div id="token-controls">
                <span id="token-totals">
                    In: <span id="tokens-in">0</span> | Out: <span id="tokens-out">0</span>
                </span>
                <label>
                    <input type="checkbox" id="token-counting-toggle"> Count Tokens
                </label>
            </div>
        </div>
        <div id="content"></div>
    </div>
    <script src="renderer.js"></script>
</body>
</html>
